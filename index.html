<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión RRDD 26</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div id="app" class="max-w-md mx-auto">
        <div id="login-view" class="space-y-4">
            <input type="text" id="dni-input" placeholder="DNI" class="w-full p-3 border rounded">
            <button onclick="acceder()" class="w-full bg-blue-600 text-white p-3 rounded">Entrar</button>
        </div>

        <div id="form-view" class="hidden space-y-4">
            <h2 id="titulo" class="font-bold text-lg"></h2>
            <div id="lista-invitados" class="space-y-4"></div>
            <button onclick="guardar()" class="w-full bg-green-600 text-white p-3 rounded">Guardar Cambios</button>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('URL', 'KEY');
        let userDni = "";

        async function acceder() {
            userDni = document.getElementById('dni-input').value.toUpperCase();
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('form-view').classList.remove('hidden');
            cargarInvitados();
        }

        async function cargarInvitados() {
            // Buscamos las que son suyas O las que le han cedido
            const { data } = await supabase.from('invitados')
                .select('*')
                .or(`titular_dni.eq.${userDni},cedido_por_dni.eq.${userDni}`);
            
            const container = document.getElementById('lista-invitados');
            container.innerHTML = "";
            
            data.forEach(inv => {
                container.innerHTML += `
                    <div class="p-4 bg-white border rounded shadow-sm">
                        <input type="text" class="nombre-inv w-full border p-1" value="${inv.nombre || ''}" placeholder="Nombre">
                        <input type="text" class="ceder-dni w-full border p-1 mt-2" placeholder="DNI para ceder (si aplica)">
                    </div>
                `;
            });
        }

        async function guardar() {
            const items = document.querySelectorAll('.p-4');
            for(let item of items) {
                const nombre = item.querySelector('.nombre-inv').value;
                const nuevoDni = item.querySelector('.ceder-dni').value.toUpperCase();

                if(nuevoDni) {
                    // Lógica de cesión limpia: actualizamos el titular_dni al nuevo dueño
                    await supabase.from('invitados').update({
                        titular_dni: nuevoDni,
                        cedido_por_dni: userDni
                    }).eq('titular_dni', userDni);
                } else {
                    // Guardado normal
                    await supabase.from('invitados').update({ nombre }).eq('titular_dni', userDni);
                }
            }
            alert("Guardado correctamente");
        }
    </script>
</body>
</html>
