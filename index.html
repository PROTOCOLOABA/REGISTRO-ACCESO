<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Invitados - RRDD 26</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <div class="max-w-md w-full mx-auto bg-white min-h-screen shadow-md p-6">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-bold text-indigo-700">RRDD 26</h1>
        </header>

        <div id="pantalla-login" class="space-y-4">
            <input type="text" id="login-dni" placeholder="DNI/NIE" class="w-full p-4 border-2 border-gray-300 rounded-xl uppercase font-semibold">
            <button onclick="verificarAcceso()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold">Acceder</button>
        </div>

        <div id="pantalla-formulario" class="hidden space-y-6">
            <h2 id="nombre-titular" class="font-bold text-lg text-gray-800"></h2>
            
            <form id="form-invitados" onsubmit="guardarDatos(event)" class="space-y-4">
                <div id="lista-invitados" class="space-y-4"></div>
                
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-200">
                    <input id="check-discapacidad" type="checkbox" class="mr-2"> 
                    <label for="check-discapacidad" class="text-xs font-bold text-blue-900">¿Zona adaptada para discapacidad?</label>
                </div>

                <div class="bg-gray-50 p-4 rounded border"><input id="check-lopd" type="checkbox" class="mr-2"> Acepto la LOPD.</div>
                <button type="submit" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold">Guardar y Confirmar</button>
            </form>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://nebtkwgebbgenmlysnui.supabase.co', 'sb_publishable_zCd7omi4D9AK2rAXlTEvmw_UwKYo0d_');
        let usuarioDni = "";

        async function verificarAcceso() {
            usuarioDni = document.getElementById('login-dni').value.trim().toUpperCase();
            const { data: titular } = await supabase.from('titulares').select('*').eq('dni', usuarioDni).maybeSingle();
            if (!titular) return Swal.fire('Error', 'DNI no autorizado', 'error');
            
            document.getElementById('nombre-titular').innerText = "Hola, " + titular.nombre;
            document.getElementById('pantalla-login').classList.add('hidden');
            document.getElementById('pantalla-formulario').classList.remove('hidden');
            cargarInvitados();
        }

        async function cargarInvitados() {
            const container = document.getElementById('lista-invitados');
            const { data } = await supabase.from('invitados').select('*').or(`titular_dni.eq.${usuarioDni},cedido_por_dni.eq.${usuarioDni}`);
            
            container.innerHTML = "";
            (data || []).forEach(inv => {
                const esCedida = inv.cedido_por_dni === usuarioDni;
                // Si alguna de sus entradas tiene marcada discapacidad, marcamos el check global
                if (inv.zona_discapacidad) document.getElementById('check-discapacidad').checked = true;

                container.innerHTML += `
                    <div class="p-4 border rounded-xl bg-white tarjeta-invitado" data-id="${inv.id}" data-es-cedida="${esCedida}">
                        <div class="flex justify-between text-xs mb-2 text-gray-500">
                            <span>${esCedida ? '🎁 Invitación recibida' : 'Tu invitación'}</span>
                            ${!esCedida ? `<label><input type="checkbox" class="check-ceder" onchange="toggleCeder(this)" ${inv.nombre === 'CEDIDO' ? 'checked' : ''}> Ceder</label>` : ''}
                        </div>
                        <input type="text" class="nombre-input w-full border p-2 ${inv.nombre === 'CEDIDO' ? 'hidden' : ''}" value="${inv.nombre || ''}" placeholder="Nombre">
                        <input type="text" class="ceder-input w-full border p-2 ${inv.nombre === 'CEDIDO' ? '' : 'hidden'}" value="${inv.apellidos || ''}" placeholder="DNI del compañero">
                    </div>
                `;
            });
        }

        function toggleCeder(el) {
            const card = el.closest('.tarjeta-invitado');
            card.querySelector('.nombre-input').classList.toggle('hidden', el.checked);
            card.querySelector('.ceder-input').classList.toggle('hidden', !el.checked);
        }

        async function guardarDatos(e) {
            e.preventDefault();
            const requiereZonaAdaptada = document.getElementById('check-discapacidad').checked;
            const tarjetas = document.querySelectorAll('.tarjeta-invitado');
            const pasesParaUpsert = [];

            for(let card of tarjetas) {
                const id = card.dataset.id;
                const esCeder = card.querySelector('.check-ceder')?.checked;
                const dniDestino = card.querySelector('.ceder-input')?.value.trim().toUpperCase();
                const nombre = card.querySelector('.nombre-input').value;

                if (esCeder && dniDestino) {
                    pasesParaUpsert.push({
                        id: id || undefined, titular_dni: dniDestino, cedido_por_dni: usuarioDni,
                        nombre: "CEDIDO", apellidos: dniDestino, dni: "CEDIDO",
                        zona_discapacidad: requiereZonaAdaptada // Se aplica a la cedida
                    });
                } else if (nombre) {
                    pasesParaUpsert.push({
                        id: id || undefined, titular_dni: usuarioDni, nombre: nombre,
                        zona_discapacidad: requiereZonaAdaptada, // Se aplica a la tuya
                        cedido_por_dni: null
                    });
                }
            }
            await supabase.from('invitados').upsert(pasesParaUpsert);
            Swal.fire('Guardado', 'Sincronizado', 'success').then(() => location.reload());
        }
    </script>
</body>
</html>
