<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Invitados - RRDD 26</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <div class="max-w-md w-full mx-auto bg-white min-h-screen shadow-md flex flex-col justify-between">
        <header class="bg-indigo-700 text-white p-6 text-center shadow-lg">
            <h1 class="text-2xl font-bold tracking-wide">RRDD 26</h1>
        </header>

        <div id="pantalla-login" class="p-6 flex-grow flex flex-col justify-center items-center">
            <input type="text" id="login-dni" placeholder="DNI/NIE" class="w-full p-4 border rounded-xl uppercase mb-4">
            <button onclick="verificarAcceso()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold">Acceder</button>
        </div>

        <div id="pantalla-formulario" class="p-6 flex-grow hidden space-y-6">
            <h2 id="nombre-titular" class="font-bold text-lg"></h2>
            <form id="form-invitados" onsubmit="guardarDatos(event)" class="space-y-4">
                <div id="lista-invitados" class="space-y-4"></div>
                <div class="bg-gray-50 p-4 rounded border"><input id="check-lopd" type="checkbox" class="mr-2"> Acepto la LOPD.</div>
                <button type="submit" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold">Guardar y Confirmar</button>
            </form>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://nebtkwgebbgenmlysnui.supabase.co', 'sb_publishable_zCd7omi4D9AK2rAXlTEvmw_UwKYo0d_');
        let usuarioDni = "";

        async function verificarAcceso() {
            usuarioDni = document.getElementById('login-dni').value.trim().toUpperCase();
            const { data: titular } = await supabase.from('titulares').select('*').eq('dni', usuarioDni).maybeSingle();
            if (!titular) return Swal.fire('Error', 'DNI no autorizado', 'error');
            
            document.getElementById('nombre-titular').innerText = titular.nombre;
            document.getElementById('pantalla-login').classList.add('hidden');
            document.getElementById('pantalla-formulario').classList.remove('hidden');
            cargarInvitados();
        }

        async function cargarInvitados() {
            const container = document.getElementById('lista-invitados');
            container.innerHTML = "";
            const { data } = await supabase.from('invitados').select('*').or(`titular_dni.eq.${usuarioDni},cedido_por_dni.eq.${usuarioDni}`);
            (data || []).forEach(inv => renderizarTarjeta(inv));
        }

        function renderizarTarjeta(inv) {
            const container = document.getElementById('lista-invitados');
            const card = document.createElement('div');
            card.className = "p-4 border rounded-xl bg-white space-y-2 tarjeta-invitado";
            card.dataset.id = inv.id;
            card.dataset.esRecibida = inv.cedido_por_dni ? "true" : "false";
            
            card.innerHTML = `
                <div class="flex justify-between text-xs font-bold text-gray-500">
                    <span>${inv.cedido_por_dni ? '🎁 Recibido de: ' + inv.cedido_por_dni : 'Invitado'}</span>
                    ${!inv.cedido_por_dni ? `<label><input type="checkbox" class="check-ceder" onchange="toggleCeder(this)" ${inv.dni === "CEDIDO" ? 'checked' : ''}> Ceder</label>` : ''}
                </div>
                <input type="text" class="inv-nombre w-full border p-2 ${inv.dni === "CEDIDO" ? 'hidden' : ''}" value="${inv.nombre || ''}" placeholder="Nombre completo">
                <input type="text" class="inv-ceder-dni w-full border p-2 ${inv.dni === "CEDIDO" ? '' : 'hidden'}" value="${inv.apellidos || ''}" placeholder="DNI del compañero">
            `;
            container.appendChild(card);
        }

        function toggleCeder(el) {
            const card = el.closest('.tarjeta-invitado');
            card.querySelector('.inv-nombre').classList.toggle('hidden', el.checked);
            card.querySelector('.inv-ceder-dni').classList.toggle('hidden', !el.checked);
        }

        async function guardarDatos(e) {
            e.preventDefault();
            Swal.fire({ title: 'Guardando...', didOpen: () => Swal.showLoading() });
            
            const tarjetas = document.querySelectorAll('.tarjeta-invitado');
            for (let card of tarjetas) {
                const id = card.dataset.id;
                const isRecibida = card.dataset.esRecibida === "true";
                const esCeder = card.querySelector('.check-ceder')?.checked;
                const dniDestino = card.querySelector('.inv-ceder-dni')?.value.trim().toUpperCase();
                const nombre = card.querySelector('.inv-nombre').value;

                if (esCeder && dniDestino) {
                    await supabase.from('invitados').upsert([{ 
                        id: id || undefined, titular_dni: dniDestino, cedido_por_dni: usuarioDni, 
                        nombre: "CEDIDO", apellidos: dniDestino, dni: "CEDIDO" 
                    }]);
                } else if (!esCeder && id && card.querySelector('.check-ceder')?.checked === false) {
                    // Si antes estaba cedida y ahora no, eliminamos el registro del compañero
                    await supabase.from('invitados').delete().eq('id', id);
                } else if (nombre) {
                    await supabase.from('invitados').upsert([{ id: id || undefined, titular_dni: usuarioDni, nombre: nombre }]);
                }
            }
            location.reload();
        }
    </script>
</body>
</html>
