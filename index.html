<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Invitados - RRDD 26</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <div class="max-w-md w-full mx-auto bg-white min-h-screen shadow-md flex flex-col justify-between">
        
        <header class="bg-indigo-700 text-white p-6 text-center shadow-lg">
            <h1 class="text-2xl font-bold tracking-wide">RRDD 26</h1>
            <p class="text-indigo-200 text-sm mt-1">Confirmación y Gestión de Invitados</p>
        </header>

        <div id="pantalla-login" class="p-6 flex-grow flex flex-col justify-center items-center">
            <div class="w-full space-y-4">
                <div class="text-center mb-6">
                    <p class="text-gray-600 font-medium">Introduce tu DNI/NIE para acceder</p>
                </div>
                <input type="text" id="login-dni" placeholder="DNI / NIE" class="w-full p-3 border rounded-lg uppercase text-center font-semibold tracking-wider focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button onclick="autenticarUsuario()" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold hover:bg-indigo-700 transition">Acceder</button>
            </div>
        </div>

        <div id="pantalla-formulario" class="hidden p-6 flex-grow flex flex-col justify-between">
            <div>
                <div class="bg-indigo-50 p-4 rounded-lg mb-6 border border-indigo-100">
                    <p class="text-xs text-indigo-500 uppercase tracking-wider font-bold">Titular de la cuenta</p>
                    <p id="nombre-titular" class="text-lg font-bold text-gray-800">-</p>
                    <p id="dni-titular" class="text-sm text-gray-500 font-mono">-</p>
                </div>

                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <span>Panel de Invitaciones</span>
                    <span id="contador-pases" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-semibold">3 pases</span>
                </h2>

                <div id="contenedor-tarjetas" class="space-y-6">
                    </div>
            </div>

            <div class="mt-8 border-t pt-4">
                <button onclick="guardarDatos()" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold text-lg shadow-lg hover:bg-emerald-700 transition flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                    Guardar y Confirmar Lista
                </button>
            </div>
        </div>

        <footer class="p-4 bg-gray-50 text-center text-xs text-gray-400 border-t">
            &copy; 2026 Organización RRDD 26
        </footer>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE
        const SUPABASE_URL = "https://nebtkwgebbgenmlysnui.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_zCd7omi4D9AK2rAXlTEvmw_UwKYo0d_";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let usuarioAutenticado = null;

        async function autenticarUsuario() {
            const inputDni = document.getElementById('login-dni').value.trim().toUpperCase();
            if (!inputDni) return Swal.fire('Atención', 'Por favor, introduce tu DNI.', 'warning');

            Swal.fire({ title: 'Verificando...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });

            try {
                const { data, error } = await _supabase.from('titulares').select('*').eq('dni', inputDni).single();
                if (error || !data) {
                    return Swal.fire('No autorizado', 'El DNI introducido no consta en el listado de autorizados.', 'error');
                }

                usuarioAutenticado = data;
                document.getElementById('nombre-titular').innerText = `${data.nombre} ${data.apellido1} ${data.apellido2 || ''}`;
                document.getElementById('dni-titular').innerText = data.dni;

                document.getElementById('pantalla-login').classList.add('hidden');
                document.getElementById('pantalla-formulario').classList.remove('hidden');

                await cargarInvitadosExistentes();
                Swal.close();
            } catch (e) {
                Swal.fire('Error', 'Hubo un problema al conectar con el servidor.', 'error');
            }
        }

        async function cargarInvitadosExistentes() {
            const contenedor = document.getElementById('contenedor-tarjetas');
            contenedor.innerHTML = '';

            try {
                // Buscamos ABSOLUTAMENTE TODO lo que pertenezca a este DNI actualmente
                const { data: todosMisRegistros } = await _supabase
                    .from('invitados')
                    .select('*')
                    .eq('titular_dni', usuarioAutenticado.dni)
                    .order('numero_acompanante', { ascending: true });

                const mapaPropios = {};
                const recibidosExtras = [];

                if (todosMisRegistros) {
                    todosMisRegistros.forEach(inv => {
                        if (inv.numero_acompanante <= 3) {
                            // Son tus 3 slots reglamentarios originales
                            mapaPropios[inv.numero_acompanante] = inv;
                        } else {
                            // Es una invitación que te cedió un compañero (ranura > 100)
                            recibidosExtras.push(inv);
                        }
                    });
                }

                // 1. Renderizar siempre las 3 ranuras base (estén vacías, rellenas o cedidas desde aquí a otro)
                for (let i = 1; i <= 3; i++) {
                    const datosInvitado = mapaPropios[i] || null;
                    crearTarjetaEnPantalla(datosInvitado, i, "propia");
                }

                // 2. Renderizar los pases extras que te han cedido a ti (asociados ya a tu DNI)
                let contadorVisual = 4;
                recibidosExtras.forEach(invCedido => {
                    crearTarjetaEnPantalla(invCedido, contadorVisual, "recibida");
                    contadorVisual++;
                });

                document.getElementById('contador-pases').innerText = `${3 + recibidosExtras.length} pases gestionados por ti`;

            } catch (e) {
                console.error("Error al cargar invitados:", e);
            }
        }

        function crearTarjetaEnPantalla(datos, numeroVisual, tipoTarjeta) {
            const contenedor = document.getElementById('contenedor-tarjetas');
            const card = document.createElement('div');
            card.dataset.numeroVisual = numeroVisual;
            card.dataset.slotOriginal = datos ? datos.numero_acompanante : numeroVisual;
            card.dataset.tipo = tipoTarjeta;

            // Detectar si esta tarjeta fue cedida por ti hacia otra persona en el pasado
            const yaCedidaHaciaAfuera = tipoTarjeta === "propia" && datos && datos.cedido_por_dni && datos.cedido_por_dni !== usuarioAutenticado.dni && datos.dni === "CEDIDO";

            if (tipoTarjeta === "recibida") {
                // TARJETA CEDIDA QUE YA ES TUYA
                card.className = "bg-emerald-50 border-2 border-emerald-400 rounded-xl shadow-sm p-4 space-y-4 relative";
                card.innerHTML = `
                    <div class="flex justify-between items-center border-b border-emerald-200 pb-2">
                        <span class="text-sm font-bold text-emerald-700 uppercase tracking-wider">Invitación Extra (Recibida)</span>
                        <span class="text-[10px] bg-emerald-200 text-emerald-800 font-bold px-2 py-0.5 rounded-full">Procedente de: ${datos.cedido_por_dni}</span>
                    </div>
                    ${obtenerCamposFormulario(datos)}
                `;
            } else {
                // TARJETA REGLAMENTARIA (1, 2 o 3)
                card.className = "bg-white border rounded-xl shadow-sm p-4 space-y-4 relative transition-all duration-300";
                card.innerHTML = `
                    <div class="flex justify-between items-center border-b pb-2">
                        <span class="text-sm font-bold text-indigo-600 uppercase tracking-wider">Invitación #${numeroVisual}</span>
                        <label class="flex items-center gap-1.5 text-xs font-semibold text-gray-600 bg-gray-50 px-2 py-1 rounded-lg cursor-pointer hover:bg-gray-100 border">
                            <input type="checkbox" class="chk-ceder rounded text-indigo-600 focus:ring-indigo-500" ${yaCedidaHaciaAfuera ? 'checked' : ''} onchange="alternarCamposCedido(this)">
                            Ceder Pase
                        </label>
                    </div>

                    <div class="div-dni-beneficiario ${yaCedidaHaciaAfuera ? '' : 'hidden'} bg-amber-50 p-3 rounded-lg border border-amber-200 space-y-2">
                        <label class="block text-xs font-bold text-amber-800 uppercase">DNI/NIE del Alumno Beneficiario:</label>
                        <input type="text" class="txt-cedido-dni w-full p-2 border border-amber-300 rounded uppercase font-mono text-center tracking-wider bg-white" placeholder="Ej: 87654321X" value="${yaCedidaHaciaAfuera ? datos.titular_dni : ''}">
                        <p class="text-[10px] text-amber-600 italic">Al guardar, esta tarjeta desaparecerá de tus opciones y se sumará al panel de tu compañero de forma definitiva.</p>
                    </div>

                    <div class="div-campos-invitado ${yaCedidaHaciaAfuera ? 'hidden' : ''} space-y-3">
                        ${obtenerCamposFormulario(yaCedidaHaciaAfuera ? null : datos)}
                    </div>
                `;
            }

            contenedor.appendChild(card);
        }

        function obtenerCamposFormulario(datos) {
            return `
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase">Nombre</label>
                        <input type="text" class="txt-nombre w-full p-2 border rounded text-sm" value="${datos?.nombre || ''}">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase">Apellidos</label>
                        <input type="text" class="txt-apellidos w-full p-2 border rounded text-sm" value="${datos?.apellidos || ''}">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase">DNI / NIE</label>
                        <input type="text" class="txt-dni w-full p-2 border rounded text-sm uppercase font-mono" value="${datos?.dni && datos.dni !== 'CEDIDO' ? datos.dni : ''}">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase">Parentesco</label>
                        <select class="sel-parentesco w-full p-2 border rounded text-sm bg-white">
                            <option value="Otros" ${datos?.parentesco === 'Otros' ? 'selected' : ''}>Otros</option>
                            <option value="Pareja" ${datos?.parentesco === 'Pareja' ? 'selected' : ''}>Pareja</option>
                            <option value="Hijo/a" ${datos?.parentesco === 'Hijo/a' ? 'selected' : ''}>Hijo/a</option>
                            <option value="Padre/Madre" ${datos?.parentesco === 'Padre/Madre' ? 'selected' : ''}>Padre/Madre</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 pt-1 border-t border-gray-50">
                    <label class="flex items-center gap-1.5 text-xs font-medium text-gray-600 cursor-pointer">
                        <input type="checkbox" class="chk-discapacidad rounded text-indigo-600" ${datos?.zona_discapacidad ? 'checked' : ''}>
                        Movilidad Reducida
                    </label>
                    <label class="flex items-center gap-1.5 text-xs font-medium text-gray-600 cursor-pointer">
                        <input type="checkbox" class="chk-excepcion rounded text-indigo-600" ${datos?.es_excepcion ? 'checked' : ''} onchange="this.closest('.space-y-3').querySelector('.div-motivo').classList.toggle('hidden', !this.checked)">
                        ¿Es Excepción?
                    </label>
                </div>
                <div class="div-motivo ${datos?.es_excepcion ? '' : 'hidden'} space-y-1">
                    <label class="block text-[10px] font-bold text-red-500 uppercase">Justificación</label>
                    <input type="text" class="txt-motivo w-full p-2 border border-red-200 rounded text-sm bg-red-50" placeholder="Motivo breve..." value="${datos?.motivo_excepcion || ''}">
                </div>
            `;
        }

        function alternarCamposCedido(checkbox) {
            const card = checkbox.closest('[data-numero-visual]');
            const divBeneficiario = card.querySelector('.div-dni-beneficiario');
            const divCamposInvitado = card.querySelector('.div-campos-invitado');

            if (checkbox.checked) {
                divBeneficiario.classList.remove('hidden');
                divCamposInvitado.classList.add('hidden');
            } else {
                divBeneficiario.classList.add('hidden');
                divCamposInvitado.classList.remove('hidden');
            }
        }

        async function guardarDatos() {
            const tarjetas = document.querySelectorAll('#contenedor-tarjetas > div');
            const listaParaUpsert = [];

            for (let card of tarjetas) {
                const tipo = card.dataset.tipo;
                const slotOriginal = parseInt(card.dataset.slotOriginal);

                const nombre = card.querySelector('.txt-nombre').value.trim();
                const apellidos = card.querySelector('.txt-apellidos').value.trim();
                const dni = card.querySelector('.txt-dni').value.trim().toUpperCase();
                const parentesco = card.querySelector('.sel-parentesco').value;
                const movilidad = card.querySelector('.chk-discapacidad').checked;
                const excepcion = card.querySelector('.chk-excepcion').checked;
                const motivo = excepcion ? card.querySelector('.txt-motivo').value.trim() : null;

                if (tipo === "propia") {
                    const chkCeder = card.querySelector('.chk-ceder');
                    
                    if (chkCeder.checked) {
                        const dniCompanero = card.querySelector('.txt-cedido-dni').value.trim().toUpperCase();
                        if (!dniCompanero) {
                            return Swal.fire('Falta DNI', `Indica el DNI del compañero en la Invitación #${card.dataset.numeroVisual}.`, 'warning');
                        }
                        if (dniCompanero === usuarioAutenticado.dni) {
                            return Swal.fire('Error', 'No puedes cederte una invitación a ti mismo.', 'error');
                        }

                        // LA CLAVE: Registramos la fila directamente vinculada al DNI de tu compañero.
                        // Usamos una ranura especial única (100 + slot actual) para que no pise sus pases 1, 2 y 3.
                        listaParaUpsert.push({
                            titular_dni: dniCompanero,             // Propiedad total de tu compañero
                            numero_acompanante: 100 + slotOriginal, // Evita colisiones
                            nombre: "", 
                            apellidos: "", 
                            dni: "CEDIDO", 
                            parentesco: parentesco,
                            zona_discapacidad: movilidad,
                            es_excepcion: excepcion,
                            motivo_excepcion: motivo,
                            cedido_por_dni: usuarioAutenticado.dni  // Marcamos quién se la dio originalmente
                        });
                    } else {
                        // Guardado normal de tus pases nativos que te quedas tú
                        listaParaUpsert.push({
                            titular_dni: usuarioAutenticado.dni,
                            numero_acompanante: slotOriginal,
                            nombre: nombre || null,
                            apellidos: apellidos || null,
                            dni: dni || null,
                            parentesco: parentesco,
                            zona_discapacidad: movilidad,
                            es_excepcion: excepcion,
                            motivo_excepcion: motivo,
                            cedido_por_dni: null
                        });
                    }
                } else if (tipo === "recibida") {
                    // Si estás modificando una tarjeta que te han cedido a ti, se guarda bajo tu DNI 
                    // conservando su número de ranura especial (>100) y su procedencia original.
                    const { data: datosViejos } = await _supabase
                        .from('invitados')
                        .select('cedido_por_dni')
                        .eq('titular_dni', usuarioAutenticado.dni)
                        .eq('numero_acompanante', slotOriginal)
                        .single();

                    listaParaUpsert.push({
                        titular_dni: usuarioAutenticado.dni,
                        numero_acompanante: slotOriginal,
                        nombre: nombre || null,
                        apellidos: apellidos || null,
                        dni: dni || null,
                        parentesco: parentesco,
                        zona_discapacidad: movilidad,
                        es_excepcion: excepcion,
                        motivo_excepcion: motivo,
                        cedido_por_dni: datosViejos?.cedido_por_dni || null
                    });
                }
            }

            Swal.fire({ title: 'Sincronizando con Supabase...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });

            try {
                if (listaParaUpsert.length > 0) {
                    const { error } = await _supabase
                        .from('invitados')
                        .upsert(listaParaUpsert, { onConflict: 'titular_dni,numero_acompanante' });

                    if (error) throw error;
                }

                // Si cediste un pase propio, necesitamos asegurarnos de limpiar tu ranura original (1, 2 o 3)
                // en tu cuenta para que no se quede duplicada.
                for (let card of tarjetas) {
                    if (card.dataset.tipo === "propia" && card.querySelector('.chk-ceder').checked) {
                        await _supabase
                            .from('invitados')
                            .delete()
                            .eq('titular_dni', usuarioAutenticado.dni)
                            .eq('numero_acompanante', parseInt(card.dataset.slotOriginal));
                    }
                }

                Swal.fire({
                    title: '¡Operación Exitosa!',
                    text: 'Los pases han sido asignados y asociados correctamente.',
                    icon: 'success',
                    confirmButtonColor: '#4f46e5'
                }).then(() => {
                    cargarInvitadosExistentes();
                });

            } catch (e) {
                console.error(e);
                Swal.fire('Error', 'Error de sincronización con la base de datos.', 'error');
            }
        }
    </script>
</body>
</html>
